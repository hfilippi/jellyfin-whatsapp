[supervisord]
nodaemon=true
user=root

[program:whatsapp]
directory=/app
command=node server.js
autostart=true
autorestart=true

stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:fastapi]
directory=/app
command=uvicorn app:app --host 0.0.0.0 --port 8000 --workers 1 --loop asyncio --log-level info
autostart=true
autorestart=true

stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0